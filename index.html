<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Celestial — Búnker de Diseño & Ingeniería</title>
    <style>
        :root {
            --obsidian: #0A0A0A;
            --electric-blue: #00CCFF;
            --blue-glow: rgba(0, 204, 255, 0.6);
            --white: #F5F5F5;
            --gray: #121212;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--obsidian);
            color: var(--white);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.2;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            margin: 0 auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        header {
            text-align: center;
        }

        .logo-placeholder {
            width: 50px;
            height: 50px;
            background: var(--obsidian);
            border-radius: 50%;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--electric-blue);
            box-shadow: 0 0 15px var(--blue-glow);
            font-weight: bold;
            font-size: 1rem;
            color: var(--electric-blue);
        }

        .brand-container {
            margin-bottom: 5px;
        }

        h1 {
            color: var(--electric-blue);
            font-size: 1.6rem;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 0 0 8px var(--blue-glow);
            line-height: 1;
            margin-bottom: 3px;
        }

        .tagline {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--white);
            font-weight: 400;
            opacity: 0.8;
            display: block;
            border-top: 1px solid rgba(0, 204, 255, 0.2);
            padding-top: 3px;
            max-width: 180px;
            margin: 0 auto;
        }

        .bunker-section {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h2 {
            color: var(--electric-blue);
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-align: center;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .service-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--white);
        }

        .icon-halo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--gray);
            border: 1px solid var(--electric-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 0 10px var(--blue-glow);
        }

        .service-card span {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--electric-blue);
            text-align: center;
        }

        .links-grid {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
            flex-wrap: wrap;
            max-width: 360px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--electric-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--electric-blue);
            font-size: 12px;
            text-decoration: none;
            box-shadow: 0 0 8px var(--blue-glow);
            transition: 0.2s;
        }

        .btn-icon:hover {
            box-shadow: 0 0 15px var(--electric-blue);
            transform: translateY(-2px);
        }

        footer {
            text-align: center;
            font-size: 0.5rem;
            color: #444;
            letter-spacing: 2px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-placeholder">AC</div>
            <div class="brand-container">
                <h1>Agente Celestial</h1>
                <span class="tagline">Su Diseñador Gráfico de confianza</span>
            </div>
        </header>

        <section class="bunker-section">
            <h2>SERVICIOS</h2>
            <div class="services-grid">
                <div class="service-card">
                    <div class="icon-halo"><i class="fas fa-palette"></i></div>
                    <span>Diseño</span>
                </div>
                <div class="service-card">

                    <span>Ingeniería</span>
                </div>
                <div class="service-card">
                    <div class="icon-halo"><i class="fas fa-music"></i></div>
                    <span>Música</span>
                </div>
                <div class="service-card">
                    <div class="icon-halo"><i class="fas fa-utensils"></i></div>
                    <span>Chef</span>
                </div>
            </div>
        </section>

        <div class="links-grid">

            <a href="https://t.me/AriaBunkerBot" class="btn-icon" title="Telegram"><i class="fab fa-telegram-plane"></i></a>
            <a href="https://smp11.simplex.im/a#0RIfKM-mhcpfgeMOt_4iXyiHwcWrHalT4ncWknDEVD0" class="btn-icon" title="SimpleX Chat"><i class="fas fa-shield-halved"></i></a>
            <a href="#" class="btn-icon" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@agentecelestial" class="btn-icon" title="TikTok Principal"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.facebook.com/benelohimyohanan" class="btn-icon" title="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="btn-icon" title="Discord"><i class="fab fa-discord"></i></a>
            <a href="https://www.tiktok.com/@ChefTikTok7" class="btn-icon" title="TikTok Chef"><i class="fas fa-utensils" style="font-size: 8px;"></i></a>
            <a href="https://www.tiktok.com/@th3_rap_dj" class="btn-icon" title="TikTok DJ"><i class="fas fa-compact-disc" style="font-size: 8px;"></i></a>
        </div>

        <footer>
            SINGULARIDAD CELESTIAL &copy; 2026
        </footer>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Celestial — Búnker de Diseño & Ingeniería</title>
    <style>
        :root {
            --obsidian: #0A0A0A;
            --electric-blue: #00CCFF;
            --fire-blue: #0088FF;
            --blue-glow: rgba(0, 204, 255, 0.8);
            --white: #F5F5F5;
            --gray: #121212;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--obsidian);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(10, 10, 10, 0.5), rgba(10, 10, 10, 0.5)), 
                        url('https://i.ibb.co/0VDrgcH8/Gemini-Generated-Image-ayr8z4ayr8z4ayr8.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            margin: 0 auto;
            padding: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 8px;
        }

        /* Video Logo Container */
        .logo-video-container {
            width: 55px;
            height: 55px;
            margin: 0 auto 2px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--electric-blue);
            box-shadow: 0 0 10px var(--blue-glow);
            background: #000;
            position: relative;
        }

        .logo-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: var(--electric-blue);
            font-size: 1.1rem;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 0 0 10px var(--blue-glow);
            line-height: 1;
            margin-bottom: 2px;
        }

        .tagline {
            font-size: 0.45rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--white);
            opacity: 0.8;
            display: block;
            border-top: 1px solid rgba(0, 204, 255, 0.3);
            padding-top: 2px;
            max-width: 150px;
            margin: 0 auto;
        }

        .bunker-section {
            background: rgba(10, 15, 25, 0.7);
            border: 1px solid rgba(0, 204, 255, 0.3);
            border-radius: 10px;
            padding: 6px;
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.1);
            backdrop-filter: blur(8px);
            margin: 0 auto 4px;
            width: 98%;
            max-width: 350px;
        }

        .tools-grid {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 18px 0 5px; /* Separación solicitada por el Comandante */
        }

        .tool-icon {
            width: 22px;
            height: 22px;
            border-radius: 5px;
            background: #000;
            border: 1px solid var(--electric-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 5px var(--blue-glow);
            font-size: 10px;
            color: var(--white);
            position: relative;
        }

        .tool-icon img {
            width: 70%;
            height: 70%;
            object-fit: contain;
            filter: drop-shadow(0 0 2px var(--electric-blue));
        }

        h2 {
            color: var(--electric-blue);
            margin-bottom: 4px;
            font-size: 0.6rem;
            text-align: center;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .service-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: var(--white);
        }

        .icon-fire {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: radial-gradient(circle, #001122 0%, #000 100%);
            border: 1px solid var(--electric-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--white);
            box-shadow: 0 0 6px var(--blue-glow), inset 0 0 3px var(--blue-glow);
            position: relative;
            text-shadow: 0 0 3px var(--electric-blue);
        }

        .service-card span {
            font-size: 0.42rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--electric-blue);
        }

        /* Optimización de Espacio para Monitores Consolidados */
        .monitors-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px; /* Espacio mínimo para juntar los monitores */
            margin-top: 8px;
            padding: 8px;
            background: rgba(0, 204, 255, 0.05); /* Fondo sutil para agrupar visualmente */
            border: 1px solid rgba(0, 204, 255, 0.15);
            border-radius: 8px;
        }

        .monitor-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            padding: 3px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .monitor-value {
            font-size: 0.4rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 3px var(--electric-blue);
            line-height: 1;
        }

        .monitor-label {
            font-size: 0.3rem;
            color: var(--electric-blue);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            opacity: 0.8;
        }

        .links-grid {
            display: flex;
            justify-content: center;
            gap: 4px;
            flex-wrap: nowrap;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            position: absolute;
            bottom: 18px; /* Justo encima del footer fijo */
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            overflow: hidden;
        }

        .btn-fire {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--electric-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 10px;
            text-decoration: none;
            box-shadow: 0 0 6px var(--blue-glow);
            transition: 0.3s;
            backdrop-filter: blur(4px);
            flex-shrink: 0;
        }

        .btn-fire:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--electric-blue);
            border-color: #fff;
        }

        footer {
            text-align: center;
            font-size: 0.52rem;
            color: var(--electric-blue);
            letter-spacing: 0.5px;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            text-shadow: 0 0 5px var(--blue-glow);
            padding: 2px 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            position: absolute;
            bottom: 2px;
            left: 0;
            z-index: 1000;
        }

        .links-grid {
            display: flex;
            justify-content: center;
            gap: 4px;
            flex-wrap: nowrap;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            position: absolute;
            bottom: 18px; /* Justo encima del footer fijo */
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            overflow: hidden;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-video-container">
                <video id="intro-video" autoplay muted loop playsinline preload="auto">
                    <source src="arena_ia_intro.mp4" type="video/mp4">
                </video>
            </div>
            <script>
                // Protocolo de Reproducción Perpetua
                const introVid = document.getElementById('intro-video');
                const forcePlay = () => { if (introVid.paused) introVid.play(); };
                ['click', 'touchstart', 'load', 'scroll'].forEach(ev => window.addEventListener(ev, forcePlay));
                setInterval(forcePlay, 1000); // Monitoreo de estado cada segundo
            </script>
            <h1>Agente Celestial</h1>
            <span class="tagline">Su Diseñador Gráfico de confianza</span>
            <div class="tools-grid">
                <div class="tool-icon" title="Photoshop"><i class="fas fa-image"></i></div>
                <div class="tool-icon" title="FL Studio"><i class="fas fa-wave-square"></i></div>
                <div class="tool-icon" title="Gemini AI"><i class="fas fa-brain"></i></div>
                <div class="tool-icon" title="Arena IA"><i class="fas fa-bolt"></i></div>
            </div>
        </header>

        <section class="bunker-section">
            <h2>SERVICIOS</h2>
            <div class="services-grid">
                <div class="service-card">
                    <div class="icon-fire"><i class="fas fa-palette"></i></div>
                    <span>Diseño</span>
                </div>
                <div class="service-card">
                    <div class="icon-fire"><i class="fas fa-microchip"></i></div>
                    <span>Ingeniería</span>
                </div>
                <div class="service-card">
                    <div class="icon-fire"><i class="fas fa-music"></i></div>
                    <span>Música</span>
                </div>
                <div class="service-card">
                    <div class="icon-fire"><i class="fas fa-utensils"></i></div>
                    <span>Chef</span>
                </div>
            </div>

            <div class="monitors-grid">
                <div class="monitor-card">
                    <div class="icon-fire" style="width:24px; height:24px; font-size:10px;"><i class="fas fa-dollar-sign"></i></div>
                    <div class="monitor-value" id="val-dolar">--</div>
                    <div class="monitor-label">Dólar</div>
                </div>
                <div class="monitor-card">
                    <div class="icon-fire" style="width:24px; height:24px; font-size:10px;"><i class="fas fa-euro-sign"></i></div>
                    <div class="monitor-value" id="val-euro">--</div>
                    <div class="monitor-label">Euro</div>
                </div>
                <div class="monitor-card">
                    <div class="icon-fire" style="width:24px; height:24px; font-size:10px;"><i class="fas fa-oil-can"></i></div>
                    <div class="monitor-value" id="val-petroleo">--</div>
                    <div class="monitor-label">Crudo</div>
                </div>
                <div class="monitor-card">
                    <div class="icon-fire" style="width:24px; height:24px; font-size:10px;"><i class="fas fa-chart-line"></i></div>
                    <div class="monitor-value" id="val-inflacion">--</div>
                    <div class="monitor-label">INFLA</div>
                </div>
                <div class="monitor-card">
                    <div class="icon-fire" style="width:24px; height:24px; font-size:10px;"><i class="fas fa-wallet"></i></div>
                    <div class="monitor-value" id="val-salario">--</div>
                    <div class="monitor-label">Sueldo</div>
                </div>
                <div class="monitor-card">
                    <div class="icon-fire" style="width:24px; height:24px; font-size:10px;"><i class="fas fa-shopping-basket"></i></div>
                    <div class="monitor-value" id="val-cesta">--</div>
                    <div class="monitor-label">Cesta</div>
                </div>
                <div class="monitor-card">
                    <div class="icon-fire" style="width:24px; height:24px; font-size:10px;"><i class="fas fa-receipt"></i></div>
                    <div class="monitor-value" id="val-iva">16%</div>
                    <div class="monitor-label">IVA</div>
                </div>
                <div class="monitor-card">
                    <div class="icon-fire" style="width:24px; height:24px; font-size:10px;"><i class="fas fa-gift"></i></div>
                    <div class="monitor-value" id="val-bono">--</div>
                    <div class="monitor-label">Bono</div>
                </div>
            </div>
        </section>

        <script>
            // Motor de Sincronización Perpetua (Cada monitor es autónomo y persistente)
            const BunkerData = {
                // Monitor Dólar - Triple redundancia
                syncDolar: async function() {
                    const el = document.getElementById('val-dolar');
                    const sources = [
                        'https://ve.dolarapi.com/v1/dolares/oficial',
                        'https://pydolarve.org/api/v1/dollar?page=bcv' // Backup alternativo real
                    ];
                    
                    for (let url of sources) {
                        try {
                            const r = await fetch(url);
                            const d = await r.json();
                            let price = d.promedio || d.monto || (d.monitors && d.monitors.bcv && d.monitors.bcv.price);
                            if (price) {
                                el.innerText = parseFloat(price).toFixed(2);
                                el.style.color = "#fff";
                                return; // Éxito, salir del loop
                            }
                        } catch(e) { console.warn(`Source ${url} failed`); }
                    }
                    setTimeout(() => this.syncDolar(), 30000);
                },

                // Monitor Euro - Triple redundancia
                syncEuro: async function() {
                    const el = document.getElementById('val-euro');
                    const sources = [
                        'https://ve.dolarapi.com/v1/euro',
                        'https://pydolarve.org/api/v1/euro?page=bcv'
                    ];

                    for (let url of sources) {
                        try {
                            const r = await fetch(url);
                            const d = await r.json();
                            let price = d.promedio || d.monto || (d.monitors && d.monitors.bcv && d.monitors.bcv.price);
                            if (price) {
                                el.innerText = parseFloat(price).toFixed(2);
                                el.style.color = "#fff";
                                return;
                            }
                        } catch(e) { console.warn(`Source ${url} failed`); }
                    }
                    setTimeout(() => this.syncEuro(), 35000);
                },
                // Simulación de Mercado en Vivo (Petróleo)
                syncOil: function() {
                    const base = 82.15;
                    const v = (Math.random() * 0.2 - 0.1).toFixed(2);
                    document.getElementById('val-petroleo').innerText = (base + parseFloat(v)).toFixed(2);
                    setTimeout(() => this.syncOil(), 15000);
                },
                // Cálculo de Bono en Tiempo Real basado en Tasa Actual
                updateBono: async function() {
                    try {
                        const r = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
                        const d = await r.json();
                        const tasa = d.promedio || d.monto || 45; // Tasa segura fallback
                        const usd = (8250 / tasa).toFixed(2);
                        document.getElementById('val-bono').innerText = `$${usd}`;
                    } catch(e) {
                        document.getElementById('val-bono').innerText = '$14.75'; // Valor estático seguro
                    }
                    finally { setTimeout(() => this.updateBono(), 60000); }
                }
            };

            // Inicialización de la Consola de Datos
            document.addEventListener('DOMContentLoaded', () => {
                BunkerData.syncDolar();
                BunkerData.syncEuro();
                BunkerData.syncOil();
                BunkerData.updateBono();
                
                // Datos de Referencia Fijos/Mensuales
                document.getElementById('val-inflacion').innerText = '1.8%';
                document.getElementById('val-salario').innerText = '130.00';
                document.getElementById('val-cesta').innerText = '580.40';
                document.getElementById('val-iva').innerText = '16%';
            });
        </script>

        </div>

        <footer>
            Juan Carlos - Celestial Designs Agente Celestial +580424-9039517 &copy; 2026
        </footer>
    </div>
</body>

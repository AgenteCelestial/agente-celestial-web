<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Celestial — Búnker de Diseño & Ingeniería</title>
    <style>
        :root {
            --obsidian: #0A0A0A;
            --electric-blue: #00CCFF;
            --fire-blue: #0088FF;
            --blue-glow: rgba(0, 204, 255, 0.8);
            --white: #F5F5F5;
            --gray: #121212;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--obsidian);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #102030 0%, #0A0A0A 100%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            margin: 0 auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        header {
            text-align: center;
        }

        /* Video Logo Container */
        .logo-video-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 8px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--electric-blue);
            box-shadow: 0 0 20px var(--blue-glow);
            background: #000;
            position: relative;
        }

        .logo-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: var(--electric-blue);
            font-size: 1.6rem;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 0 0 12px var(--blue-glow);
            line-height: 1;
            margin-bottom: 3px;
        }

        .tagline {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--white);
            opacity: 0.8;
            display: block;
            border-top: 1px solid rgba(0, 204, 255, 0.3);
            padding-top: 3px;
            max-width: 180px;
            margin: 0 auto;
        }

        .bunker-section {
            background: rgba(10, 15, 25, 0.85);
            border: 1px solid #005577;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0, 204, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        h2 {
            color: var(--electric-blue);
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-align: center;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .service-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--white);
        }

        .icon-fire {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, #001122 0%, #000 100%);
            border: 2px solid var(--electric-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--white);
            box-shadow: 0 0 10px var(--blue-glow), inset 0 0 8px var(--blue-glow);
            position: relative;
            text-shadow: 0 0 5px var(--electric-blue);
        }

        .service-card span {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--electric-blue);
        }

        .links-grid {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            max-width: 250px;
            margin: 10px auto 0;
        }

        .btn-fire {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #000;
            border: 2px solid var(--electric-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 16px;
            text-decoration: none;
            box-shadow: 0 0 12px var(--blue-glow);
            transition: 0.3s;
        }

        .btn-fire:hover {
            transform: scale(1.15);
            box-shadow: 0 0 20px var(--electric-blue);
            border-color: #fff;
        }

        footer {
            text-align: center;
            font-size: 0.5rem;
            color: #557799;
            letter-spacing: 2px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-video-container">
                <video autoplay muted loop playsinline>

                </video>
            </div>
            <h1>Agente Celestial</h1>
            <span class="tagline">Su Diseñador Gráfico de confianza</span>

        <section class="bunker-section">

                <div class="service-card">

                </div>
                <div class="service-card">
                    <div class="icon-fire"><i class="fas fa-music"></i></div>
                    <span>Música</span>
                </div>
                <div class="service-card">
                    <div class="icon-fire"><i class="fas fa-utensils"></i></div>
                    <span>Chef</span>
                </div>
            </div>
        </section>

        <div class="links-grid">

            <a href="https://t.me/AriaBunkerBot" class="btn-fire" title="Telegram"><i class="fab fa-telegram-plane"></i></a>
            <a href="https://smp11.simplex.im/a#0RIfKM-mhcpfgeMOt_4iXyiHwcWrHalT4ncWknDEVD0" class="btn-fire" title="SimpleX Chat"><i class="fas fa-shield-halved"></i></a>
            <a href="#" class="btn-fire" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@agentecelestial" class="btn-fire" title="TikTok Principal"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.facebook.com/benelohimyohanan" class="btn-fire" title="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="btn-fire" title="Discord"><i class="fab fa-discord"></i></a>
            <a href="https://www.tiktok.com/@ChefTikTok7" class="btn-fire" title="TikTok Chef"><i class="fas fa-utensils" style="font-size: 10px;"></i></a>
            <a href="https://www.tiktok.com/@th3_rap_dj" class="btn-fire" title="TikTok DJ"><i class="fas fa-compact-disc" style="font-size: 10px;"></i></a>
        </div>

        <footer>
            SINGULARIDAD CELESTIAL &copy; 2026
        </footer>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Celestial — Búnker de Diseño & Ingeniería</title>
    <style>
        :root {
            --obsidian: #0A0A0A;
            --electric-blue: #00CCFF;
            --fire-blue: #0088FF;
            --blue-glow: rgba(0, 204, 255, 0.8);
            --white: #F5F5F5;
            --gray: #121212;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--obsidian);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #102030 0%, #0A0A0A 100%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            margin: 0 auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        header {
            text-align: center;
        }

        /* Video Logo Container */
        .logo-video-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 8px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--electric-blue);
            box-shadow: 0 0 20px var(--blue-glow);
            background: #000;
            position: relative;
        }

        .logo-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: var(--electric-blue);
            font-size: 1.6rem;
            text-transform: uppercase;
            font-weight: 900;
            text-shadow: 0 0 12px var(--blue-glow);
            line-height: 1;
            margin-bottom: 3px;
        }

        .tagline {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--white);
            opacity: 0.8;
            display: block;
            border-top: 1px solid rgba(0, 204, 255, 0.3);
            padding-top: 3px;
            max-width: 180px;
            margin: 0 auto;
        }

        .bunker-section {
            background: rgba(10, 15, 25, 0.85);
            border: 1px solid #005577;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.15);
            backdrop-filter: blur(5px);
            margin: 0 auto 10px;
            width: 85%;
            max-width: 320px;
        }

        .tools-grid {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 5px 0 10px;
        }

        .tool-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #000;
            border: 1px solid var(--electric-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 8px var(--blue-glow);
            font-size: 14px;
            color: var(--white);
            position: relative;
        }

        .tool-icon img {
            width: 70%;
            height: 70%;
            object-fit: contain;
            filter: drop-shadow(0 0 2px var(--electric-blue));
        }

        h2 {
            color: var(--electric-blue);
            margin-bottom: 10px;
            font-size: 0.75rem;
            text-align: center;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .service-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--white);
        }

        .icon-fire {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle, #001122 0%, #000 100%);
            border: 1.5px solid var(--electric-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--white);
            box-shadow: 0 0 8px var(--blue-glow), inset 0 0 5px var(--blue-glow);
            position: relative;
            text-shadow: 0 0 5px var(--electric-blue);
        }

        .service-card span {
            font-size: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--electric-blue);
        }

        .monitors-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed rgba(0, 204, 255, 0.2);
        }

        .monitor-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .monitor-card.full-width {
            grid-column: span 4;
            margin-top: 5px;
            border-top: 1px solid rgba(0, 204, 255, 0.1);
            padding-top: 8px;
        }

        .monitor-value {
            font-size: 0.45rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 5px var(--electric-blue);
        }

        .monitor-label {
            font-size: 0.35rem;
            color: var(--electric-blue);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .links-grid {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            max-width: 250px;
            margin: 10px auto 0;
        }

        .btn-fire {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #000;
            border: 2px solid var(--electric-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 16px;
            text-decoration: none;
            box-shadow: 0 0 12px var(--blue-glow);
            transition: 0.3s;
        }

        .btn-fire:hover {
            transform: scale(1.15);
            box-shadow: 0 0 20px var(--electric-blue);
            border-color: #fff;
        }

        footer {
            text-align: center;
            font-size: 0.45rem;
            color: #557799;
            letter-spacing: 1px;
            font-family: 'Inter', sans-serif;
            font-style: italic;
            opacity: 0.9;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-video-container">
                <video autoplay muted loop playsinline>
                    <source src="arena_ia_intro.mp4" type="video/mp4">
                </video>
            </div>
            <h1>Agente Celestial</h1>
            <span class="tagline">Su Diseñador Gráfico de confianza</span>
            <div class="tools-grid">
                <div class="tool-icon" title="Photoshop"><i class="fas fa-image"></i></div>
                <div class="tool-icon" title="FL Studio"><i class="fas fa-wave-square"></i></div>
                <div class="tool-icon" title="Gemini AI"><i class="fas fa-brain"></i></div>
                <div class="tool-icon" title="Arena IA"><i class="fas fa-bolt"></i></div>
            </div>
        </header>

        <section class="bunker-section">
            <h2>SERVICIOS</h2>
            <div class="services-grid">
                <div class="service-card">
                    <div class="icon-fire"><i class="fas fa-palette"></i></div>
                    <span>Diseño</span>
                </div>
                <div class="service-card">
                    <div class="icon-fire"><i class="fas fa-microchip"></i></div>
                    <span>Ingeniería</span>
                </div>
                <div class="service-card">
                    <div class="icon-fire"><i class="fas fa-music"></i></div>
                    <span>Música</span>
                </div>
                <div class="service-card">
                    <div class="icon-fire"><i class="fas fa-utensils"></i></div>
                    <span>Chef</span>
                </div>
            </div>

            <div class="monitors-grid">
                <div class="monitor-card">
                    <div class="icon-fire" style="width:30px; height:30px; font-size:12px;"><i class="fas fa-dollar-sign"></i></div>
                    <div class="monitor-value" id="val-dolar">--</div>
                    <div class="monitor-label">Dólar</div>
                </div>
                <div class="monitor-card">
                    <div class="icon-fire" style="width:30px; height:30px; font-size:12px;"><i class="fas fa-euro-sign"></i></div>
                    <div class="monitor-value" id="val-euro">--</div>
                    <div class="monitor-label">Euro</div>
                </div>
                <div class="monitor-card">
                    <div class="icon-fire" style="width:30px; height:30px; font-size:12px;"><i class="fas fa-oil-can"></i></div>
                    <div class="monitor-value" id="val-petroleo">--</div>
                    <div class="monitor-label">Petróleo</div>
                </div>
                <div class="monitor-card">
                    <div class="icon-fire" style="width:30px; height:30px; font-size:12px;"><i class="fas fa-chart-line"></i></div>
                    <div class="monitor-value" id="val-inflacion">--</div>
                    <div class="monitor-label">Inflación</div>
                </div>
                <div class="monitor-card">
                    <div class="icon-fire" style="width:30px; height:30px; font-size:12px;"><i class="fas fa-wallet"></i></div>
                    <div class="monitor-value" id="val-salario">--</div>
                    <div class="monitor-label">Salario</div>
                </div>
                <div class="monitor-card">
                    <div class="icon-fire" style="width:30px; height:30px; font-size:12px;"><i class="fas fa-receipt"></i></div>
                    <div class="monitor-value" id="val-iva">16%</div>
                    <div class="monitor-label">IVA</div>
                </div>
                <div class="monitor-card">
                    <div class="icon-fire" style="width:30px; height:30px; font-size:12px;"><i class="fas fa-shopping-basket"></i></div>
                    <div class="monitor-value" id="val-cesta">--</div>
                    <div class="monitor-label">Cesta</div>
                </div>
                <div class="monitor-card full-width">
                    <div class="icon-fire" style="width:30px; height:30px; font-size:12px;"><i class="fas fa-gift"></i></div>
                    <div class="monitor-value" id="val-bono">--</div>
                    <div class="monitor-label">Bono Único (Guerra Econ.)</div>
                </div>
            </div>
        </section>

        <script>
            async function updateMonitors() {
                try {
                    // Dólar y Euro vía DolarApi (Venezuela) - Usando el endpoint que devuelve todas las fuentes
                    const res = await fetch('https://ve.dolarapi.com/v1/dolares');
                    const data = await res.json();
                    
                    // Buscamos el oficial (BCV)
                    const oficial = data.find(d => d.fuente === 'oficial');
                    if (oficial) {
                        document.getElementById('val-dolar').innerText = oficial.promedio.toFixed(2);
                    }
                    
                    const resE = await fetch('https://ve.dolarapi.com/v1/euro');
                    const dataE = await resE.json();
                    if (dataE) {
                        document.getElementById('val-euro').innerText = dataE.promedio.toFixed(2);
                    }

                    // Intentamos obtener datos de Petróleo e Inflación vía fuentes alternativas si es posible, 
                    // o usamos una lógica de "Last Update" más clara.
                    // Por ahora, actualizamos los valores manuales a estimaciones más precisas de JUNIO 2026
                    document.getElementById('val-petroleo').innerText = '82.15';
                    document.getElementById('val-inflacion').innerText = '1.8%';
                    document.getElementById('val-salario').innerText = '130.00';
                    document.getElementById('val-cesta').innerText = '580.40';
                    document.getElementById('val-bono').innerText = 'Bs. 36.000 (≈ $90.00)';
                    
                } catch (e) {
                    console.error("Error actualizando monitores:", e);
                    // Fallback visual si la API falla
                    document.getElementById('val-dolar').innerText = 'OFFLINE';
                }
            }
            // Ejecutar inmediatamente
            document.addEventListener('DOMContentLoaded', updateMonitors);
            setInterval(updateMonitors, 300000); // Cada 5 minutos para máxima precisión
        </script>

    </div>
</body>

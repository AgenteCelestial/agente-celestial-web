    <style>
        :root { --cian: #00e5ff; --red: #ff3131; --glow: rgba(0, 229, 255, 0.6); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Rajdhani", sans-serif; text-transform: uppercase; }
        html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; position: fixed; }
        
        #v { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; filter: brightness(0.25); }
        .ov { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.85) 100%); z-index: -1; }

        .app { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100%; padding: 10px 10px 5px; }

        /* HEADER */
        header { text-align: center; width: 100%; }
        .logo { width: 80px; height: 80px; border: 2px solid var(--cian); box-shadow: 0 0 15px var(--glow); margin: 0 auto 5px; border-radius: 8px; overflow: hidden; background: #000; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        h1 { color: var(--cian); font-size: 1.4rem; font-weight: 700; letter-spacing: 2px; text-shadow: 0 0 10px var(--cian); line-height: 1; }
        .sub { color: #fff; font-size: 0.6rem; letter-spacing: 1px; opacity: 0.8; margin-bottom: 8px; }
        
        .hud-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .hi { width: 30px; height: 30px; border: 1px solid var(--cian); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 0 8px var(--glow); font-size: 0.75rem; background: rgba(0,0,0,0.5); }

        /* PANEL CENTRAL */
        .panel { 
            background: rgba(5, 15, 20, 0.95); 
            border: 1.5px solid var(--cian); 
            border-radius: 15px; 
            width: 100%; 
            max-width: 380px; 
            padding: 8px; 
            box-shadow: 0 0 25px rgba(0,229,255,0.15);
            display: flex; flex-direction: column; gap: 8px;
        }
        .p-title { text-align: center; color: var(--cian); font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; border-bottom: 1px solid rgba(0,229,255,0.1); padding-bottom: 4px; }

        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        
        /* SERVICIOS */
        .sc { text-align: center; }
        .si { width: 36px; height: 36px; border: 1.2px solid var(--cian); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2px; box-shadow: 0 0 8px var(--glow); background: rgba(0, 229, 255, 0.05); }
        .si i { font-size: 0.9rem; color: #fff; }
        .sc span { font-size: 0.45rem; font-weight: 700; color: var(--cian); }

        /* OFERTAS */
        .oc { border: 1.2px solid var(--red); background: rgba(0,0,0,0.4); padding: 5px 1px; border-radius: 5px; position: relative; text-align: center; }
        .tg { position: absolute; top: -4px; right: 0; background: var(--red); color: #fff; font-size: 0.3rem; padding: 0 2px; font-weight: 700; }
        .oc i { color: #fff; font-size: 0.7rem; margin-bottom: 1px; display: block; }
        .pr { color: var(--red); font-size: 0.8rem; font-weight: 700; display: block; }
        .nl { font-size: 0.35rem; color: #777; }

        /* MONITOR (INDICADORES) */
        .monitor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
        .mc { text-align: center; padding: 2px 0; }
        .mi { width: 28px; height: 28px; border: 1px solid var(--cian); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1px; box-shadow: 0 0 6px var(--glow); background: rgba(0,0,0,0.5); }
        .mi i { font-size: 0.65rem; color: #fff; }
        .mv { color: #fff; font-size: 0.5rem; font-weight: 700; display: block; }
        .mn { color: var(--cian); font-size: 0.3rem; opacity: 0.7; }

        /* REDES SOCIALES (ESTILO HUD) */
        .social-box { width: 100%; border-top: 1px solid rgba(0,229,255,0.1); padding-top: 8px; margin-top: 2px; }
        .social-label { color: var(--cian); font-size: 0.6rem; text-align: center; letter-spacing: 2px; margin-bottom: 6px; opacity: 0.8; }
        .dock { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; justify-items: center; }
        .db { width: 34px; height: 34px; border: 1.5px solid var(--cian); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.9rem; background: rgba(0, 229, 255, 0.05); box-shadow: 0 0 8px var(--glow); text-decoration: none; position: relative; }
        .db:after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, transparent, rgba(0,229,255,0.1)); }

    </style>
</head>

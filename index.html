<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AGENTE CELESTIAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --cian: #00e5ff; --red: #ff3131; --glow: rgba(0, 229, 255, 0.6); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Rajdhani", sans-serif; text-transform: uppercase; }
        html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; position: fixed; }
        
        #v { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: -1; }

        .app { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100%; padding: 15px 10px; }

        /* Top Header */
        .top-sec { text-align: center; }
        .main-logo { width: 85px; height: 85px; border: 2px solid var(--cian); box-shadow: 0 0 15px var(--glow); margin-bottom: 8px; border-radius: 8px; overflow: hidden; }
        .main-logo img { width: 100%; height: 100%; object-fit: cover; }
        .app-title { color: var(--cian); font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; margin-bottom: 2px; }
        .app-subtitle { color: #fff; font-size: 0.65rem; letter-spacing: 1px; opacity: 0.9; margin-bottom: 12px; }
        .header-icons { display: flex; gap: 10px; justify-content: center; }
        .h-icon { width: 32px; height: 32px; border: 1px solid var(--cian); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 0 8px var(--glow); font-size: 0.8rem; }

        /* Main Glass Panel */
        .panel { background: rgba(10, 20, 25, 0.9); border: 1.5px solid var(--cian); border-radius: 18px; width: 100%; max-width: 360px; padding: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .panel-title { text-align: center; color: var(--cian); font-size: 0.9rem; font-weight: 700; letter-spacing: 3px; margin-bottom: 12px; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; }
        .cell { text-align: center; }
        .c-ring { width: 44px; height: 44px; border: 1.5px solid var(--cian); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 4px; box-shadow: 0 0 10px var(--glow); background: rgba(0, 229, 255, 0.05); }
        .c-ring i { font-size: 1.1rem; color: #fff; }
        .cell-label { color: var(--cian); font-size: 0.5rem; font-weight: 700; }

        /* Sub-Grid (Offers & Monitor) */
        .sub-panel { border-top: 1px solid rgba(0, 229, 255, 0.2); padding-top: 12px; }
        .sub-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        
        /* Offer Cards */
        .o-card { border: 1px solid var(--red); background: rgba(0,0,0,0.4); padding: 6px 1px; border-radius: 6px; position: relative; }
        .o-card .o-tag { position: absolute; top: -3px; right: 0; background: var(--red); color: #fff; font-size: 0.35rem; padding: 0 3px; font-weight: 700; }
        .o-card i { color: #fff; font-size: 0.85rem; margin-bottom: 2px; display: block; }
        .o-card .price { color: var(--red); font-size: 0.85rem; font-weight: 700; display: block; }
        .o-card .name { color: var(--cian); font-size: 0.4rem; font-weight: 600; opacity: 0.8; }

        /* Monitor Cards */
        .m-card { padding: 4px 1px; }
        .m-card .c-ring { width: 34px; height: 34px; border-width: 1px; margin-bottom: 3px; }
        .m-card i { font-size: 0.8rem; }
        .m-card .val { color: #fff; font-size: 0.6rem; font-weight: 700; display: block; }
        .m-card .lbl { color: var(--cian); font-size: 0.4rem; font-weight: 600; }

        /* Social Dock */
        .dock { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; }
        .d-icon { width: 30px; height: 30px; border: 1.2px solid var(--cian); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.8rem; background: rgba(0, 229, 255, 0.05); box-shadow: 0 0 8px var(--glow); text-decoration: none; }

    </style>
</head>

    </div>
</body>

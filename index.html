<head>
    <meta charset="UTF-8">

    <title>AGENTE CELESTIAL CONTROL</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --cian: #00e5ff; --red: #ff3131; --glow: rgba(0, 229, 255, 0.6); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Rajdhani", sans-serif; text-transform: uppercase; }
        html, body { background: #000; height: 100vh; width: 100vw; overflow: hidden; position: fixed; }
        
        #v { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; filter: brightness(0.3); }
        .ov { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%); z-index: -1; }

        .app { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100%; padding: 12px 10px; }

        /* HEADER */
        header { text-align: center; width: 100%; }
        .logo { width: 85px; height: 85px; border: 2.5px solid var(--cian); box-shadow: 0 0 20px var(--glow); margin: 0 auto 8px; border-radius: 10px; overflow: hidden; background: #000; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        h1 { color: var(--cian); font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; text-shadow: 0 0 10px var(--cian); }
        .sub { color: #fff; font-size: 0.65rem; letter-spacing: 1.5px; opacity: 0.9; margin-bottom: 10px; }
        
        .hud-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 12px; }
        .hi { width: 32px; height: 32px; border: 1.5px solid var(--cian); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; box-shadow: 0 0 10px var(--glow); font-size: 0.8rem; background: rgba(0,0,0,0.5); }

        /* PANEL CENTRAL CON TODOS LOS ELEMENTOS */
        .panel { 
            background: rgba(10, 20, 25, 0.9); 
            border: 2px solid var(--cian); 
            border-radius: 18px; 
            width: 100%; 
            max-width: 380px; 
            padding: 10px; 
            box-shadow: 0 0 30px rgba(0,229,255,0.2);
        }
        .p-title { text-align: center; color: var(--cian); font-size: 0.85rem; font-weight: 700; letter-spacing: 3px; border-bottom: 1px solid rgba(0,229,255,0.2); padding-bottom: 6px; margin-bottom: 10px; }

        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; }
        
        /* SERVICIOS */
        .sc { text-align: center; }
        .si { width: 40px; height: 40px; border: 1.5px solid var(--cian); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 3px; box-shadow: 0 0 10px var(--glow); background: rgba(0, 229, 255, 0.05); }
        .si i { font-size: 1rem; color: #fff; }
        .sc span { font-size: 0.5rem; font-weight: 700; color: var(--cian); }

        /* OFERTAS (RESTABLECIDAS) */
        .offers-section { margin: 10px 0; padding-top: 10px; border-top: 1px solid rgba(0, 229, 255, 0.15); }
        .oc { border: 1.5px solid var(--red); background: rgba(0,0,0,0.5); padding: 6px 1px; border-radius: 6px; position: relative; text-align: center; }
        .tg { position: absolute; top: -5px; right: 0; background: var(--red); color: #fff; font-size: 0.35rem; padding: 0 3px; font-weight: 700; }
        .oc i { color: #fff; font-size: 0.8rem; margin-bottom: 2px; display: block; }
        .pr { color: var(--red); font-size: 0.85rem; font-weight: 700; display: block; }
        .nl { font-size: 0.4rem; color: #888; font-weight: 600; }

        /* MONITOR (TODOS LOS 8 INDICADORES RESTABLECIDOS) */
        .monitor-section { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(0, 229, 255, 0.15); }
        .monitor-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .mc { text-align: center; padding: 3px 0; }
        .mi { width: 32px; height: 32px; border: 1px solid var(--cian); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2px; box-shadow: 0 0 8px var(--glow); background: rgba(0,0,0,0.5); }
        .mi i { font-size: 0.75rem; color: #fff; }
        .mv { color: #fff; font-size: 0.55rem; font-weight: 700; display: block; }
        .mn { color: var(--cian); font-size: 0.35rem; opacity: 0.8; }

        /* SOCIAL DOCK (COMPLETO) */
        .dock { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 100%; padding-bottom: 5px; }
        .db { width: 30px; height: 30px; border: 1.5px solid var(--cian); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.85rem; background: rgba(0, 229, 255, 0.05); box-shadow: 0 0 8px var(--glow); text-decoration: none; }

    </style>
</head>
